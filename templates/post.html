{% extends "base.html" %}
{% block title %}글 보기 — 원고지{% endblock %}
{% block bodyclass %}page-post{% endblock %}

{% block content %}
<article class="post-detail" id="post-detail" data-post-id="{{ post_id }}">
  <div class="post-margin" aria-hidden="true"></div>
  <div class="post-body">
    <div class="skeleton-line skeleton-title"></div>
    <div class="skeleton-line skeleton-meta"></div>
    <div class="skeleton-line"></div>
    <div class="skeleton-line"></div>
    <div class="skeleton-line short"></div>
  </div>
</article>

<p id="not-found" class="empty-state" hidden>
  <svg viewBox="0 0 64 64" width="48" height="48" aria-hidden="true">
    <rect x="6" y="6" width="52" height="52" fill="none" stroke="currentColor" stroke-width="2" stroke-dasharray="4 4"/>
  </svg>
  글을 찾을 수 없어요.
  <a href="/" class="btn btn-outline" style="margin-top:1rem;">홈으로 돌아가기</a>
</p>
{% endblock %}

{% block scripts %}
<script type="module" src="{{ url_for('static', filename='js/post-detail.js') }}"></script>
{% endblock %}
